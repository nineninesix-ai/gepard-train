# Voice cloning ON, compressor FROZEN (LoRA short-phrase fine-tune).
# Prefix stays present (input distribution unchanged) but the speaker-grouping
# machinery (SupCon + diversity + P·K+M sampler) is off → plain random batching.
# See MODEL_GUIDE §4, §5 (short-register fix).
enabled: true
reference_sampling:
  l_min_seconds: 3.0
  l_max_seconds: 15.0
  min_ref_duration_seconds: 3.0
  singleton_min_target_for_slice: 6.0
  use_self_reference: true        # ref = target's own audio (skip random read)
compressor:
  num_queries: 8
  num_layers: 2
  num_heads: 8
  d_model: 1024
  ffn_hidden_size_multiplier: 4
  dropout: 0.1
  queries_init_std: 0.02
  lr_multiplier: 0.1              # frozen here → unused
training:
  cfg_dropout_prob: 0.15
  null_prefix_init_std: 0.02
  diversity_loss:
    enabled: false
    gamma: 0.5
    weight: 0.3
    warmup_start: 1000
    ramp_steps: 1500
  supcon:
    enabled: false
    P: 16
    K: 3
    M: 16
    weight: 0.3
    warmup_start: 1000
    ramp_steps: 500
    temperature: 0.1
    use_projection: true
    projection_hidden_dim: 128
    projection_dim: 128
    gather_across_ranks: true
