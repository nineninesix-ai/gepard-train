[pytest]
# Repo root on sys.path so tests import the in-tree `gepard` package.
pythonpath = .
testpaths = tests
# Fast tiny-model + pure-logic tests run by default. The real-backbone golden
# checks need a GPU + a ~1GB download, so they are opt-in:  pytest -m real_model
addopts = -q -m "not real_model"
markers =
    real_model: golden-loss checks against the real 513M backbone (GPU + network). Run with `pytest -m real_model`.
